# Mapa oficial do projeto para uso humano e por IA.

[project]
name = "pulsemac"
root = "/Users/brenomayder/projects/desktop/pulsemac"
language = "pt-BR"
stack = "Swift macOS AppKit/SwiftUI/WidgetKit"

[files]
scope = "ESCOPO.md"
governance = "GOVERNANCA.md"
roadmap = "QUALITY_ROADMAP.md"
backlog = "DEMANDAS.md"
bugs = "BUGS.md"
screens = "TELAS.md"
tests = "TESTES.md"
decisions = "DECISOES.md"
runbook = "RUNBOOK.md"
readme = "README.md"
check = "./check.sh"
mindmap_complete = "MAPA_MENTAL_MARKMAP.md"
mindmap_executive = "MAPA_EXECUTIVO_MARKMAP.md"
legacy_architecture = "ARCHITECTURE.md"
legacy_roadmap = "ROADMAP.md"
legacy_checklist = "CHECKLIST.md"
privacy = "PRIVACY.md"

[rules]
read_order = [
  "PATHS.toml",
  "QUALITY_ROADMAP.md",
  "GOVERNANCA.md",
  "DEMANDAS.md",
]

[modules]
app.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/App"
domain.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/Domain"
data.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/Data"
presentation.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/Presentation"
system_metrics.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/SystemMetrics"
storage.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/Storage"
widgets.root = "/Users/brenomayder/projects/desktop/pulsemac/Sources/Widgets"
tests.root = "/Users/brenomayder/projects/desktop/pulsemac/Tests"

[checks]
required = [
  "./check.sh",
]

[quality]
max_file_lines = 2000
max_function_lines = 60
runtime_dirs = [
  "Sources",
]
docs_only_paths = [
  "PATHS.toml",
  "ESCOPO.md",
  "GOVERNANCA.md",
  "QUALITY_ROADMAP.md",
  "DEMANDAS.md",
  "BUGS.md",
  "TELAS.md",
  "TESTES.md",
  "DECISOES.md",
  "RUNBOOK.md",
  "README.md",
  "MAPA_MENTAL_MARKMAP.md",
  "MAPA_EXECUTIVO_MARKMAP.md",
]
sql_dirs = []
forbid_runtime_patterns = [
  "PKG-[0-9]+",
  "Lote [0-9]+",
]

[quality.stack]
language = "swift"
framework = "macOS AppKit, SwiftUI, WidgetKit, XCTest"

[quality.coverage]
enabled = false
min_lines = 0
critical_min_lines = 0

[quality.fixtures]
dirs = []
allow_production_dump = false
require_deterministic_ids = true
max_fixture_file_kb = 512
forbid_fixture_name_patterns = [
  "prod",
  "production",
  "dump-real",
  "real-dump",
]

[quality.observability]
enabled = true
default_log_retention_days = 30
audit_retention_days = 180
prefer_existing_tables = true
avoid_new_tables_without_justification = true
require_cleanup_policy = true

[quality.layering]
enabled = true
forbidden_imports = [
  "domain->appkit",
  "domain->swiftui",
  "domain->sqlite",
  "presentation->system_metrics_direct",
]

[ai.reading]
default = ["PATHS.toml"]
package = ["PATHS.toml", "QUALITY_ROADMAP.md", "GOVERNANCA.md", "DEMANDAS.md"]
bug = ["PATHS.toml", "BUGS.md", "TESTES.md"]
ui = ["PATHS.toml", "TELAS.md", "TESTES.md"]
architecture = ["PATHS.toml", "ESCOPO.md", "QUALITY_ROADMAP.md", "DECISOES.md"]
